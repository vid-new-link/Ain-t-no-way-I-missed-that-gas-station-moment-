<!-- ===== CONTENT GATE WITH IMAGE ===== -->
<style>
#gateOverlay {
  position: fixed;
  inset: 0;
  z-index: 99999;
  background: #000;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
}

/* FAKE PLAYER */
.fake-player {
  position: relative;
  width: 100%;
  height: 100%;
  background: url('https://cdn.aceimg.com/34a0f671f.png') center/cover no-repeat;
}

.fake-overlay {
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,.45);
}

/* PLAY BUTTON */
.fake-play {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%,-50%);
  width: 90px;
  height: 90px;
  border-radius: 50%;
  background: rgba(255,255,255,.95);
}
.fake-play:after {
  content:'';
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-35%,-50%);
  border-top:16px solid transparent;
  border-bottom:16px solid transparent;
  border-left:26px solid #000;
}

/* TEXT */
.gate-text {
  position: absolute;
  bottom: 90px;
  width: 100%;
  text-align: center;
  color: #fff;
  font-size: 18px;
  font-family: Arial, sans-serif;
}

/* FAKE PROGRESS */
.progress {
  position: absolute;
  bottom: 0;
  left: 0;
  width: 100%;
  height: 5px;
  background: rgba(255,255,255,.25);
}
.bar {
  width: 42%;
  height: 100%;
  background: #ff0000;
}
</style>

<div id="gateOverlay" onclick="openContent()">
  <div class="fake-player">
    <div class="fake-overlay"></div>

    <div class="fake-play"></div>

    <div class="gate-text">
      Tap to continue watching
    </div>

    <div class="progress">
      <div class="bar"></div>
    </div>
  </div>
</div>

<script>
document.body.style.overflow = "hidden";

function openContent(){
  document.getElementById("gateOverlay").style.display = "none";
  document.body.style.overflow = "auto";
}
</script>
